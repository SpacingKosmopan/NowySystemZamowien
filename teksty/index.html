<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ICONS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="teksty.css" />
    <!-- RUBIK FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <aside id="dashboard-navbar">
      <h1>
        <a href="../index.html" id="home-link">
          <i class="bi bi-house-fill"></i> Dashboard</a
        >
      </h1>
      <hr class="separator" />
      <a class="dashboard-link" href="../zamowienia/index.html"
        ><i class="bi bi-clipboard2-fill"></i> Zamówienia</a
      >
      <a class="dashboard-link" href="../kalendarz/index.html"
        ><i class="bi bi-calendar-event-fill"></i> Kalendarz</a
      >
      <a class="dashboard-link" href="../klienci/index.html"
        ><i class="bi bi-file-person-fill"></i> Klienci</a
      >
      <a class="dashboard-link" href="../typy_tagi/index.html"
        ><i class="bi bi-info-circle-fill"></i> Typy zamówień | Tagi</a
      >
      <a class="dashboard-link" href="index.html"
        ><i class="bi bi-chat-left-quote-fill"></i> Teksty</a
      >
      <a class="dashboard-link" href="../galeria/index.html"
        ><i class="bi bi-image-fill"></i> Galeria</a
      >
      <i
        class="bi bi-chevron-double-left"
        id="dashboard-toggle-visibility"
        onclick="toggleDashboardNavbar()"
      ></i>
      <hr class="separator" />
    </aside>
    <button id="toggle-btn" onclick="toggleDashboardNavbar()">
      <i class="bi bi-chevron-double-right"></i>
    </button>

    <main>
      <header>
        <h1 id="page-name">
          Teksty
          <button id="add-text" class="footer-button">
            <i class="bi bi-file-plus-fill"></i> Nowy tekst
          </button>
        </h1>
        <nav class="subnav">
          <!-- breadcrumbs -->
        </nav>
      </header>
      <hr class="horizontal-separator" />
      <section id="">
        <input type="text" id="folder-name" placeholder="Nazwa folderu" />
        <button id="add-folder-btn">Dodaj folder</button>
        <ul id="tree"></ul>
      </section>
    </main>

    <!-- wyskakujące okienko -->
    <div class="overlay hidden" id="new-order-overlay">
      <div class="modal">
        <div class="container">
          <input type="text" id="text-name" placeholder="Nazwa tekstu" />
          <button id="add-text-btn">Dodaj tekst</button>
          <button id="cancel-btn">Anuluj</button>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../script.js"></script>
    <script>
      // === LOGOWANIE ===

      init();

      async function init() {
        const res = await fetch("../logowanie/api/auth.php", {
          credentials: "include",
        });

        if (res.status === 401 || res.status === 403) {
          alert("Brak dostępu. Należy się zalogować");
          return;
        }

        loadData();
      }

      // =====

      function loadData() {
        const params = new URLSearchParams(window.location.search);
        let currentParentId = params.get("id-folderu");
        if (currentParentId === "") currentParentId = null;
        else if (currentParentId !== null) {
          currentParentId = Number(currentParentId);
        }

        let path = [];
        let allData = [];
        let editingId = null;

        // ================== LOAD ==================
        function buildPath(parentId) {
          let tempPath = [];
          let current = parentId;

          while (current !== null) {
            const item = allData.find((i) => i.struktura_id == current);
            if (!item) break;

            tempPath.unshift(item);
            current = item.rodzic_id;
          }

          path = tempPath;
        }

        function loadData() {
          fetch("api/get_all.php")
            .then(async (res) => {
              return res;
            })
            .then(async (res) => {
              const text = await res.text();
              try {
                return JSON.parse(text);
              } catch {
                console.error("Nie JSON:", text);
                throw new Error("Invalid JSON");
              }
            })
            .then((data) => {
              allData = data;

              if (currentParentId !== null) {
                buildPath(currentParentId);
              }

              render();
            });
        }

        // ================== RENDER ==================
        function render() {
          console.log(`Render->CurrentParentId: ${currentParentId}`);
          const tree = document.getElementById("tree");
          tree.innerHTML = "";

          if (path.length) {
            const liBack = document.createElement("li");
            liBack.innerHTML = "<i class='bi bi-arrow-left-circle'></i> ..";
            liBack.style.cursor = "pointer";
            liBack.onclick = (e) => {
              e.stopPropagation();
              goBack(path.length - 2);
            };
            tree.appendChild(liBack);
          }

          const items = allData.filter((i) => i.rodzic_id == currentParentId);
          // katalogi pierwsze
          const sorted = [...items].sort((a, b) => {
            if (a.typ === "catalogue" && b.typ === "text/plain") return -1;
            if (a.typ === "text/plain" && b.typ === "catalogue") return 1;
            return 0;
          });
          console.log({ sorted });

          sorted.forEach((item) => {
            const li = document.createElement("li");

            if (item.typ === "catalogue") {
              li.classList.add("folder");

              li.innerHTML = `
              <div class="item-left">
                <i class="bi bi-folder"></i>
                ${item.struktura_nazwa}
              </div>
              <button class="delete-catalogue-btn" data-id="${item.struktura_id}">
                <i class="bi bi-trash3-fill"></i>
              </button>
            `;

              li.onclick = (e) => {
                if (e.target.closest(".delete-catalogue-btn")) return;

                enterFolder(item);
              };
            } else {
              li.innerHTML = `
              <div class="item-left">
                <i class="bi bi-file-text"></i>
                ${item.struktura_nazwa}
              </div>
            `;
              li.classList.add("text");

              li.onclick = () => openText(item);
            }

            tree.appendChild(li);
          });

          renderBreadcrumbs();
          attachDeleteFolderButtons();
        }

        // ================== NAVIGATION ==================
        function enterFolder(folder) {
          console.log(`Entering Folder: `, folder);
          path.push(folder);
          currentParentId = folder.struktura_id;
          history.pushState(null, "", "?id-folderu=" + currentParentId);
          render();
        }

        function goBack(index) {
          console.log(`Entering Folder: ${index}`);
          path = path.slice(0, index + 1);
          currentParentId = path.length
            ? path[path.length - 1].struktura_id
            : null;
          render();
        }

        // ================== BREADCRUMBS ==================
        function renderBreadcrumbs() {
          const nav = document.querySelector(".subnav");
          nav.innerHTML = "";

          const root = document.createElement("span");
          root.textContent = "main";
          root.style.cursor = "pointer";
          root.onclick = () => {
            path = [];
            currentParentId = null;
            render();
          };
          nav.appendChild(root);

          path.forEach((p, index) => {
            const span = document.createElement("span");
            span.textContent = " / " + p.struktura_nazwa;
            span.style.cursor = "pointer";
            span.onclick = () => goBack(index);
            nav.appendChild(span);
          });
        }

        // ================== OPEN TEXT ==================
        function openText(item) {
          console.log(`Opening Text:`, item);
          // Przekierowanie GET - spójne z tym, co robisz po dodaniu tekstu
          window.location.href = `./tekst/index.php?id=${item.tekst_id}`;
        }

        // ================== MODAL ==================
        document.getElementById("add-text").onclick = () => {
          editingId = null;

          document
            .getElementById("new-order-overlay")
            .classList.remove("hidden");
          document.getElementById("text-name").value = "";

          document.getElementById("add-text-btn").textContent = "Dodaj";
        };

        // zamykanie po kliknięciu tła
        document.getElementById("new-order-overlay").onclick = (e) => {
          if (e.target.id === "new-order-overlay") {
            e.target.classList.add("hidden");
          }
        };

        // ================== ADD FOLDER ==================
        document.getElementById("add-folder-btn").onclick = () => {
          const name = document.getElementById("folder-name").value;
          if (!name) return alert("Podaj nazwę folderu");
          console.log(`Adding folder: ${name}`);

          console.log("Wysyłam do rodzica: (dodaję folder)", currentParentId);
          fetch("api/add_structure.php", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              nazwa: name,
              rodzic_id: currentParentId,
              typ: "catalogue",
            }),
          })
            .then(async (res) => {
              console.log(`api/add_structure.php->`, res);
              return res;
            })
            .then(async (res) => {
              const text = await res.text();
              try {
                return JSON.parse(text);
              } catch {
                console.error("Nie JSON:", text);
                throw new Error("Invalid JSON");
              }
            })
            .then((res) => {
              if (res.success) {
                document.getElementById("folder-name").value = "";
                loadData();
              } else {
                alert("Błąd dodawania folderu");
              }
            });
        };

        // ================== ADD TEXT ==================
        document.getElementById("add-text-btn").onclick = async () => {
          const name = document.getElementById("text-name").value;

          if (!name) return alert("Podaj nazwę tekstu");

          try {
            console.log("Wysyłam do rodzica: (dodaję tekst)", currentParentId);
            const res = await fetch("api/add_text.php", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                tytul: name,
                struktura_id: currentParentId ?? null,
                tresc: "",
              }),
            });

            const text = await res.text();

            let data;
            try {
              data = JSON.parse(text);
            } catch (e) {
              console.error("Backend nie zwrócił JSON:", text);
              throw new Error("Invalid JSON");
            }

            if (!data.success) {
              alert(data.error || "Błąd dodawania tekstu");
              return;
            }

            document.getElementById("text-name").value = "";
            document
              .getElementById("new-order-overlay")
              .classList.add("hidden");

            loadData();

            window.location.href = "./tekst/index.php?id=" + data.tekst_id;
          } catch (err) {
            console.error(err);
            alert("Błąd połączenia");
          }
        };

        document.getElementById("cancel-btn").onclick = () => {
          document.getElementById("new-order-overlay").classList.add("hidden");
          editingId = null;
        };

        // ================== INIT ==================
        loadData();

        // ================== DELETE FOLDER ==================
        function attachDeleteFolderButtons() {
          const deleteButtons = document.querySelectorAll(
            "#tree button[data-id]",
          );

          deleteButtons.forEach((btn) => {
            if (btn.dataset.listenerAttached) return;
            btn.dataset.listenerAttached = true;

            btn.addEventListener("click", async (e) => {
              e.stopPropagation();
              e.preventDefault();

              const id = btn.dataset.id;

              if (
                !confirm(
                  "Na pewno chcesz usunąć ten folder i wszystkie jego podfoldery?",
                )
              )
                return;

              try {
                const res = await fetch("api/delete_structure.php", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ struktura_id: id }),
                });

                const result = await res.json();

                if (result.success) {
                  alert("Folder i cała zawartość zostały usunięte.");
                  loadData();
                } else {
                  alert("Błąd przy usuwaniu folderu");
                }
              } catch (err) {
                console.error(err);
                alert("Błąd połączenia");
              }
            });
          });
        }

        attachDeleteFolderButtons();
      }
    </script>
  </body>
</html>
