<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ICONS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="clients.css" />
    <!-- RUBIK FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <aside id="dashboard-navbar">
      <h1>
        <a href="../index.html" id="home-link">
          <i class="bi bi-house-fill"></i> Dashboard</a
        >
      </h1>
      <hr class="separator" />
      <a class="dashboard-link" href="../zamowienia/index.html"
        ><i class="bi bi-clipboard2-fill"></i> Zamówienia</a
      >
      <a class="dashboard-link" href="../kalendarz/index.html"
        ><i class="bi bi-calendar-event-fill"></i> Kalendarz</a
      >
      <a class="dashboard-link" href="index.html"
        ><i class="bi bi-file-person-fill"></i> Klienci</a
      >
      <a class="dashboard-link" href="../typy_tagi/index.html"
        ><i class="bi bi-info-circle-fill"></i> Typy zamówień | Tagi</a
      >
      <a class="dashboard-link" href="../teksty/index.html"
        ><i class="bi bi-chat-left-quote-fill"></i> Teksty</a
      >
      <a class="dashboard-link" href="../galeria/index.html"
        ><i class="bi bi-image-fill"></i> Galeria</a
      >
      <i
        class="bi bi-chevron-double-left"
        id="dashboard-toggle-visibility"
        onclick="toggleDashboardNavbar()"
      ></i>
      <hr class="separator" />
    </aside>
    <button id="toggle-btn" onclick="toggleDashboardNavbar()">
      <i class="bi bi-chevron-double-right"></i>
    </button>

    <main>
      <header>
        <h1 id="page-name">Klienci</h1>
        <nav class="subnav"></nav>
      </header>
      <hr class="horizontal-separator" />
      <section id="wrapper">
        <div id="content-header">
          <h2>
            <i class="space-20"></i>
            Lista klientów
          </h2>
          <button id="add-new-client-btn" type="button">+ Nowy klient</button>
          Sortowanie <button id="client-sort-by"></button>
          <button id="client-sort-order"></button>
        </div>
        <div id="content"></div>
      </section>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../script.js"></script>
    <script>
      // === LOGOWANIE ===

      init();

      async function init() {
        const res = await fetch("../logowanie/api/auth.php", {
          credentials: "include",
        });

        if (res.status === 401 || res.status === 403) {
          alert("Brak dostępu. Należy się zalogować");
          return;
        }

        loadData();
      }

      /////

      // === SORT SETTINGS ===
      let clientSortBy = "imie";
      let clientSortOrder = "asc";

      async function loadData() {
        await renderClients();

        $("#add-new-client-btn").on("click", renderNewClientForm);

        const clientSortOrderBtn = $("#client-sort-order");
        const clientSortByBtn = $("#client-sort-by");

        clientSortByBtn.text(clientSortBy === "imie" ? "Imię" : "Nazwisko");
        clientSortOrderBtn.text(
          clientSortOrder === "asc" ? "Rosnąco" : "Malejąco",
        );

        // imię | nazwisko
        $("#client-sort-by").on("click", async function () {
          clientSortBy = clientSortBy === "imie" ? "nazwisko" : "imie";
          clientSortByBtn.text(clientSortBy === "imie" ? "Imię" : "Nazwisko");
          await renderClients();
        });

        // rosnąco | malejąco
        $("#client-sort-order").on("click", async function () {
          clientSortOrder = clientSortOrder === "asc" ? "desc" : "asc";
          clientSortOrderBtn.text(
            clientSortOrder === "asc" ? "Rosnąco" : "Malejąco",
          );
          await renderClients();
        });
      }

      const content = $("#content");
      function renderNewClientForm() {
        const html = `
          <h2>
            <i class="space-20"></i>
            Nowy klient</h2>
          <form id="clientForm">
            <input type="text" name="imie" placeholder="Imię" required>
            <input type="text" name="nazwisko" placeholder="Nazwisko" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="text" name="telefon" placeholder="Telefon">
            <input type="text" name="adres" placeholder="Adres">
            <button type="submit">Dodaj</button>
            <button id="cancel" type="button">Anuluj</button>
          </form>
        `;

        content.html(html);

        $("#clientForm #cancel").on("click", function () {
          $("#clientForm")[0].reset();
          renderClients();
        });

        $("#clientForm").on("submit", async function (e) {
          e.preventDefault();

          const formData = Object.fromEntries(new FormData(this));

          const res = await fetch("api/clients.php", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(formData),
          });

          const data = await res.json();

          if (res.ok) {
            alert("Dodano klienta");
            renderClients();
          } else {
            const err = await res.json();
            alert("Błąd: " + (err.error || "UNKNOWN_ERROR"));
          }
        });
      }

      async function renderClients() {
        const res = await fetch("api/clients.php");

        if (!res.ok) {
          alert("Błąd pobierania klientów");
          return;
        }

        let data = await res.json();
        let clients = data.clients;

        clients.sort((a, b) => {
          const valA = (a[clientSortBy] || "").toLowerCase();
          const valB = (b[clientSortBy] || "").toLowerCase();

          if (valA < valB) return clientSortOrder === "asc" ? -1 : 1;
          if (valA > valB) return clientSortOrder === "asc" ? 1 : -1;
          return 0;
        });

        let html = `
          <table border="1" cellpadding="8">
            <tr>
              <th>ID</th>
              <th>Imię i nazwisko</th>
              <th>Email</th>
              <th>Telefon</th>
              <th>Akcje</th>
            </tr>
        `;

        clients.forEach((c) => {
          html += `
            <tr>
              <td>${c.id}</td>
              <td>${c.imie} ${c.nazwisko}</td>
              <td>${c.email}</td>
              <td>${c.telefon || ""}</td>
              <td>
                <button onclick="editClient(${c.id})">Edytuj</button>
                <button onclick="deleteClient(${c.id})">Usuń</button>
                <button onclick="showOrders(${c.id})">Zamówienia</button>
              </td>
            </tr>
          `;
        });

        html += `</table>`;

        content.html(html);
      }

      async function deleteClient(id) {
        if (!confirm("Na pewno usunąć?")) return;

        const res = await fetch("api/clients.php", {
          method: "DELETE",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ id }),
        });

        if (res.ok) {
          renderClients();
        } else {
          const err = await res.json();
          alert("Błąd: " + (err.error || "DELETE_FAILED"));
        }
      }

      async function editClient(id) {
        $("#content-header").addClass("hidden");

        const res = await fetch(`api/clients.php?id=${id}`);

        if (!res.ok) {
          alert("Nie udało się pobrać klienta");
          return;
        }

        const client = await res.json();
        const c = client.client;

        const html = `
          <h2>
            <i class="space-20"></i>
            Edytuj klienta</h2>
          <form id="editForm">
            <input type="hidden" name="id" value="${id}">
            <input type="text" name="imie" value="${c.imie}" required placeholder="Imię...">
            <input type="text" name="nazwisko" value="${c.nazwisko}" required placeholder="Nazwisko...">
            <input type="email" name="email" value="${c.email}" required placeholder="Email...">
            <input type="text" name="telefon" value="${c.telefon || ""}" placeholder="Telefon...">
            <input type="text" name="adres" value="${c.adres || ""}" placeholder="Adres...">
            <button type="submit">Zapisz</button>
            <button id="cancel" type="button">Anuluj</button>
          </form>
        `;

        content.html(html);

        $("#editForm #cancel").on("click", function () {
          renderClients();
          $("#content-header").removeClass("hidden");
        });

        $("#editForm").on("submit", async function (e) {
          e.preventDefault();

          const formData = Object.fromEntries(new FormData(this));

          const res = await fetch("api/clients.php", {
            method: "PATCH",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(formData),
          });

          if (res.ok) {
            renderClients();
            $("#content-header").removeClass("hidden");
          } else {
            const err = await res.json();
            alert("Błąd: " + (err.error || "UPDATE_FAILED"));
          }
        });
      }

      async function showOrders(clientId) {
        window.location.href = `zamowienia/index.html?id=${clientId}`;
      }
    </script>
  </body>
</html>
