<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ICONS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="../../style.css" />
    <link rel="stylesheet" href="../clients.css" />
    <!-- RUBIK FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <aside id="dashboard-navbar">
      <h1>
        <a href="../../index.html" id="home-link">
          <i class="bi bi-house-fill"></i> Dashboard</a
        >
      </h1>
      <hr class="separator" />
      <a class="dashboard-link" href="../../zamowienia/index.html"
        ><i class="bi bi-clipboard2-fill"></i> Zamówienia</a
      >
      <a class="dashboard-link" href="../../kalendarz/index.html"
        ><i class="bi bi-calendar-event-fill"></i> Kalendarz</a
      >
      <a class="dashboard-link" href="../index.html"
        ><i class="bi bi-file-person-fill"></i> Klienci</a
      >
      <a class="dashboard-link" href="../../typy_tagi/index.html"
        ><i class="bi bi-info-circle-fill"></i> Typy zamówień | Tagi</a
      >
      <a class="dashboard-link" href="../../teksty/index.html"
        ><i class="bi bi-chat-left-quote-fill"></i> Teksty</a
      >
      <a class="dashboard-link" href="../../galeria/index.html"
        ><i class="bi bi-image-fill"></i> Galeria</a
      >
      <i
        class="bi bi-chevron-double-left"
        id="dashboard-toggle-visibility"
        onclick="toggleDashboardNavbar()"
      ></i>
      <hr class="separator" />
    </aside>
    <button id="toggle-btn" onclick="toggleDashboardNavbar()">
      <i class="bi bi-chevron-double-right"></i>
    </button>

    <main>
      <header>
        <h1 id="page-name">Klienci</h1>
        <nav class="subnav"></nav>
      </header>
      <hr class="horizontal-separator" />
      <section id="content"></section>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../../script.js"></script>
    <script>
      // === LOGOWANIE ===

      init();

      async function init() {
        const res = await fetch("../../logowanie/api/auth.php", {
          credentials: "include",
        });

        if (res.status === 401 || res.status === 403) {
          alert("Brak dostępu. Należy się zalogować");
          return;
        }

        loadData();
      }

      /////

      function loadData() {
        $(document).ready(function () {
          const params = new URLSearchParams(window.location.search);

          showOrders(params.get("id"));
        });
      }

      const content = $("#content");

      function goBack() {
        window.location.href = "../index.html";
      }

      async function showOrders(clientId) {
        const res = await fetch(`../api/orders.php?id=${clientId}`);
        const c = await res.json();
        if (!c.success) {
          alert("Błąd wczytywania");
          console.error(c);
          return;
        }

        content.html("");
        content.html(content.html() + `<button onClick=goBack()>Wróć</button>`);
        renderOrders(c.orders);
      }

      function renderOrders(orders) {
        const container = $("#content");

        if (!orders || orders.length === 0) {
          container.append(
            `<p class="empty-state">Brak zamówień dla tego klienta</p>`,
          );
          return;
        }

        const wrapper = $('<div class="orders-wrapper"></div>');

        orders.forEach((order) => {
          const statusClass = getStatusClass(order.status);

          // tagi: backend daje "null" jako string -> trzeba ogarnąć
          let tags = [];
          try {
            tags = JSON.parse(order.tagi);
            if (!Array.isArray(tags)) tags = [];
          } catch {
            tags = [];
          }

          const card = $(`
            <div class="order-card" data-id="${order.id}">
              <div class="order-header">
                <span class="order-title">${order.tytul || "Brak tytułu"}</span>
                <span class="order-status ${statusClass}">${order.status}</span>
              </div>

            <div class="order-meta">
              <div class="meta-left">
                <p><strong>ID:</strong> ${order.id}</p>
                <p><strong>Typ:</strong> ${order.typ}</p>
              </div>

              <div class="meta-right">
                <p><strong>Utworzono:</strong> ${order.data_utworzenia}</p>
                <p><strong>Termin:</strong> ${order.termin_realizacji}</p>
              </div>
            </div>

              <div class="order-footer">
                <span class="order-price">${order.kwota} PLN</span>
              </div>

            ${
              tags.length
                ? `<div class="order-tags">
                    ${tags.map((t) => `<span class="tag">${t}</span>`).join("")}
                  </div>`
                : ""
            }
            </div>
          `);

          card.on("click", function () {
            window.location.href = `../../zamowienia/index.html?id=${order.id}&isViewOnly=true`;
          });

          wrapper.append(card);
        });

        container.append(wrapper);
      }

      function getStatusClass(status) {
        if (!status) return "status-unknown";

        const s = status.toLowerCase();

        if (s.includes("nowe") || s.includes("pending"))
          return "status-pending";
        if (s.includes("zrealizowane") || s.includes("done"))
          return "status-done";
        if (s.includes("anulowane") || s.includes("cancel"))
          return "status-cancel";
        if (s.includes("w realizacji") || s.includes("in realisation"))
          return "status-realis";

        return "status-unknown";
      }
    </script>
  </body>
</html>
