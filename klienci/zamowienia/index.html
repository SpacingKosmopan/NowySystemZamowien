<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ICONS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="../../style.css" />
    <link rel="stylesheet" href="../clients.css" />
    <link rel="stylesheet" href="../../root_colors.css" />
    <!-- RUBIK FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <aside id="dashboard-navbar">
      <h1>
        <a href="../../index.html" id="home-link">
          <i class="bi bi-house-fill"></i> Dashboard</a
        >
      </h1>
      <hr class="separator" />
      <a class="dashboard-link" href="../../zamowienia/index.html"
        ><i class="bi bi-clipboard2-fill"></i> Zamówienia</a
      >
      <a class="dashboard-link" href="../../kalendarz/index.html"
        ><i class="bi bi-calendar-event-fill"></i> Kalendarz</a
      >
      <a class="dashboard-link" href="../index.html"
        ><i class="bi bi-file-person-fill"></i> Klienci</a
      >
      <a class="dashboard-link" href="../../typy_tagi/index.html"
        ><i class="bi bi-info-circle-fill"></i> Typy zamówień | Tagi</a
      >
      <a class="dashboard-link" href="../../teksty/index.html"
        ><i class="bi bi-chat-left-quote-fill"></i> Teksty</a
      >
      <a class="dashboard-link" href="../../galeria/index.html"
        ><i class="bi bi-image-fill"></i> Galeria</a
      >
      <i
        class="bi bi-chevron-double-left"
        id="dashboard-toggle-visibility"
        onclick="toggleDashboardNavbar()"
      ></i>
      <hr class="separator" />
    </aside>
    <button id="toggle-btn" onclick="toggleDashboardNavbar()">
      <i class="bi bi-chevron-double-right"></i>
    </button>

    <main>
      <header>
        <h1 id="page-name">Klienci</h1>
        <nav class="subnav"></nav>
      </header>
      <hr class="horizontal-separator" />
      <section id="content">
        <button id="back-btn">Wróć</button>
        <div id="which-client"></div>
        <table id="client-orders-content">
          <thead>
            <tr>
              <th>ID</th>
              <th>Tytuł</th>
              <th>Typ</th>
              <th>Cena</th>
              <th>Termin</th>
              <th>Status</th>
              <th>Utworzono</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../../script.js"></script>
    <script>
      // === LOGOWANIE ===

      init();

      async function init() {
        const res = await fetch("../../logowanie/api/auth.php", {
          credentials: "include",
        });

        if (res.status === 401 || res.status === 403) {
          alert("Brak dostępu. Należy się zalogować");
          return;
        }

        loadData();
      }

      /////

      function loadData() {
        $(document).ready(function () {
          const params = new URLSearchParams(window.location.search);

          showOrders(params.get("id"));
        });
      }

      const content = $("#content");

      function goBack() {
        window.location.href = "../index.html";
      }

      async function showOrders(clientId) {
        const clientRes = await fetch(`../api/get.php?id=${clientId}`);
        const clientJson = await clientRes.json();
        if (!clientJson.success) {
          alert("Błąd wczytywania klienta");
          console.error(clientJson);
          return;
        }
        $("#which-client").append(
          `<h1>${clientJson.client.imie} ${clientJson.client.nazwisko}</h1>`,
        );

        const res = await fetch(`../api/orders.php?id=${clientId}`);
        const c = await res.json();
        if (!c.success) {
          alert("Błąd wczytywania zamówień");
          console.error(c);
          return;
        }

        $("#back-btn").on("click", goBack);
        renderOrders(c.orders);
      }

      function renderOrders(orders) {
        const container = $("#client-orders-content tbody");
        container.empty();

        if (!orders || orders.length === 0) {
          container.append(`<tr><td colspan="7">Brak zamówień</td></tr>`);
          return;
        }

        orders.forEach((order) => {
          const statusClass = getStatusClass(order.status);

          const row = $(`
        <tr class="trow">
          <td>${order.id}</td>
          <td>${order.tytul}</td>
          <td>${order.typ}</td>
          <td>${order.kwota} zł</td>
          <td>${order.termin_realizacji}</td>
          <td><span class="order-status ${statusClass}">${order.status}</span></td>
          <td>${order.data_utworzenia}</td>
        </tr>
      `);

          row.on("click", function () {
            window.location.href = `../../zamowienia/index.html?id=${order.id}&isViewOnly=true`;
          });

          container.append(row);
        });
      }

      function getStatusClass(status) {
        if (!status) return "status-unknown";

        const s = status.toLowerCase();

        if (s.includes("nowe")) return "status-new";
        if (s.includes("zrealizowane")) return "status-done";
        if (s.includes("anulowane")) return "status-cancel";
        if (s.includes("w realizacji")) return "status-in-progress";

        return "status-unknown";
      }
    </script>
  </body>
</html>
