<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ICONS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="typy_tagi.css" />
    <!-- RUBIK FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <aside id="dashboard-navbar">
      <h1>
        <a href="../index.html" id="home-link">
          <i class="bi bi-house-fill"></i> Dashboard</a
        >
      </h1>
      <hr class="separator" />
      <a class="dashboard-link" href="../zamowienia/index.html"
        ><i class="bi bi-clipboard2-fill"></i> Zamówienia</a
      >
      <a class="dashboard-link" href="../kalendarz/index.html"
        ><i class="bi bi-calendar-event-fill"></i> Kalendarz</a
      >
      <a class="dashboard-link" href="../klienci/index.html"
        ><i class="bi bi-file-person-fill"></i> Klienci</a
      >
      <a class="dashboard-link" href="index.html"
        ><i class="bi bi-info-circle-fill"></i> Typy zamówień | Tagi</a
      >
      <a class="dashboard-link" href="../teksty/index.html"
        ><i class="bi bi-chat-left-quote-fill"></i> Teksty</a
      >
      <a class="dashboard-link" href="../galeria/index.html"
        ><i class="bi bi-image-fill"></i> Galeria</a
      >
      <i
        class="bi bi-chevron-double-left"
        id="dashboard-toggle-visibility"
        onclick="toggleDashboardNavbar()"
      ></i>
      <hr class="separator" />
    </aside>
    <button id="toggle-btn" onclick="toggleDashboardNavbar()">
      <i class="bi bi-chevron-double-right"></i>
    </button>

    <main>
      <header>
        <h1 id="page-name">Typy zamówień i Tagi</h1>
        <nav class="subnav">
          <!-- breadcrumbs -->
        </nav>
      </header>
      <hr class="horizontal-separator" />
      <section id="content">
        <div id="menu-buttons">
          <button id="open-types" class="selected">Typy zamówień</button>
          <button id="open-tags">Tagi</button>
        </div>
        <input type="text" id="new-element-name" placeholder="Nazwa..." />
        <button id="add-new-element">Dodaj</button>
        <div id="contents-list"></div>
      </section>
    </main>

    <!-- wyskakujące okienko -->
    <div class="overlay hidden" id="new-order-overlay">
      <div class="modal">
        <div class="container">
          <input type="text" id="text-name" placeholder="Nazwa tekstu" />
          <button id="add-text-btn">Dodaj tekst</button>
          <button id="cancel-btn">Anuluj</button>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../script.js"></script>
    <script>
      // === LOGOWANIE ===

      init();

      async function init() {
        const res = await fetch("../logowanie/api/auth.php", {
          credentials: "include",
        });

        //alert(res.status);

        if (res.status === 401 || res.status === 403) {
          alert("Brak dostępu. Należy się zalogować");
          return;
        }

        loadData();
      }

      /////

      function loadData() {
        let opened = "types";

        // FETCH DATA
        async function GetData() {
          try {
            const res = await fetch(
              opened === "types"
                ? "api/get_all_types.php"
                : "api/get_all_tags.php",
            );

            return await res.json();
          } catch (err) {
            console.error("Błąd pobierania:", err);
            return [];
          }
        }

        // RENDER
        async function RenderList() {
          const data = await GetData();

          $("#contents-list").empty();

          if (!data.length) {
            $("#contents-list").html("<p>Brak danych</p>");
            return;
          }

          data.forEach((element) => {
            $("#contents-list").append(`
            <div class="list-item">
              <span>${element.nazwa}</span>
              <button class="delete-btn" data-id="${element.id}">
                <i class="bi bi-trash"></i>
              </button>
            </div>
          `);
          });
        }

        // SWITCH
        function OpenTypes() {
          opened = "types";
          $("#menu-buttons button").removeClass("selected");
          $(`#open-${opened}`).addClass("selected");
          RenderList();
        }

        function OpenTags() {
          opened = "tags";
          $("#menu-buttons button").removeClass("selected");
          $(`#open-${opened}`).addClass("selected");
          RenderList();
        }

        $("#open-types").on("click", OpenTypes);
        $("#open-tags").on("click", OpenTags);

        // DELETE
        $("#contents-list").on("click", ".delete-btn", function () {
          const id = $(this).data("id");

          const confirmed = confirm("Na pewno usunąć ten element?");
          if (!confirmed) return;

          const url =
            opened === "tags" ? "api/delete_tag.php" : "api/delete_type.php";

          fetch(url, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ id }),
          })
            .then((res) => res.text())
            .then((data) => {
              RenderList();
            })
            .catch((err) => console.error("Błąd usuwania:", err));
        });

        // ADD
        $("#add-new-element").on("click", function () {
          const name = $("#new-element-name").val().trim();

          if (!name) {
            alert("Podaj nazwę");
            return;
          }

          const url =
            opened === "tags" ? "api/add_tag.php" : "api/add_type.php";

          fetch(url, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ nazwa: name }),
          })
            .then((res) => res.text())
            .then((data) => {
              console.log(data);
              $("#new-element-name").val("");
              RenderList();
            })
            .catch((err) => console.error("Błąd dodawania:", err));
        });

        // INIT
        RenderList();
      }
    </script>
  </body>
</html>
