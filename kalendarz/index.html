<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- ICONS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="calendar.css">
    <!-- RUBIK FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
</head>
<body>
    <aside id="dashboard-navbar">
        <h1> <a href="../index.html" id="home-link"> <i class="bi bi-house-fill"></i> Dashboard</a></h1>
        <hr class="separator">
        <a class="dashboard-link" href="../zamowienia/index.html"><i class="bi bi-clipboard2-fill"></i> Zamówienia</a>
        <a class="dashboard-link" href="index.html"><i class="bi bi-calendar-event-fill"></i> Kalendarz</a>
        <a class="dashboard-link" href="../klienci/index.html"><i class="bi bi-file-person-fill"></i> Klienci</a>
        <a class="dashboard-link" href="../typy_tagi/index.html"><i class="bi bi-info-circle-fill"></i> Typy zamówień | Tagi</a>
        <a class="dashboard-link" href="../teksty/index.html"><i class="bi bi-chat-left-quote-fill"></i> Teksty</a>
        <a class="dashboard-link" href="../galeria/index.html"><i class="bi bi-image-fill"></i> Galeria</a>
        <i class="bi bi-chevron-double-left" id="dashboard-toggle-visibility" onclick="toggleDashboardNavbar()"></i>
        <hr class="separator">
    </aside>
    <button id="toggle-btn" onclick="toggleDashboardNavbar()"><i class="bi bi-chevron-double-right"></i></button>

    <main>
        <header>
            <h1 id="page-name">Kalendarz</h1>
            <nav class="subnav">
                <label for="view-type" class="sort-type">
                    <i class="sort-type-name">Widok</i>
                    <select name="view-type" id="view-type">
                        <option value="m">Miesiąc</option>
                        <option value="w">Tydzień</option>
                        <option value="d">Dzień</option>
                    </select>
                </label>
            </nav>
        </header>
        <hr class="horizontal-separator">
        <div class="content">
            <section id="all-orders">  
                <div class="calendar">
                    <div id="calendar-container" class="calendar">
                        <div class="calendar-header">
                            <button id="prev-month">&lt;</button>
                            <h2 id="month-year"></h2>
                            <button id="next-month">&gt;</button>
                        </div>
                        <div class="calendar-grid"></div>
                    </div>
            </section>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../script.js"></script>
    <script src="calendar_generator.js"></script>
</body>
</html>
