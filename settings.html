<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ICONS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="root_colors.css" title="root-colors" />
    <!-- RUBIK FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <aside id="dashboard-navbar">
      <h1>
        <a href="index.html" id="home-link">
          <i class="bi bi-house-fill"></i> Dashboard</a
        >
      </h1>
      <hr class="separator" />
      <a class="dashboard-link" href="zamowienia/index.html"
        ><i class="bi bi-clipboard2-fill"></i> Zamówienia</a
      >
      <a class="dashboard-link" href="kalendarz/index.html"
        ><i class="bi bi-calendar-event-fill"></i> Kalendarz</a
      >
      <a class="dashboard-link" href="klienci/index.html"
        ><i class="bi bi-file-person-fill"></i> Klienci</a
      >
      <a class="dashboard-link" href="typy_tagi/index.html"
        ><i class="bi bi-info-circle-fill"></i> Typy zamówień | Tagi</a
      >
      <a class="dashboard-link" href="teksty/index.html"
        ><i class="bi bi-chat-left-quote-fill"></i> Teksty</a
      >
      <a class="dashboard-link" href="galeria/index.html"
        ><i class="bi bi-image-fill"></i> Galeria</a
      >
      <i
        class="bi bi-chevron-double-left"
        id="dashboard-toggle-visibility"
        onclick="toggleDashboardNavbar()"
      ></i>
      <hr class="separator" />
    </aside>

    <main>
      <header id="index-header">
        <h1>Ustawienia</h1>
      </header>
      <section id="theme-form">
        <h2>Kolory – Kalendarz</h2>

        <label>Nowe zamówienie (domyślnie: #ffe29a)</label>
        <input type="color" id="cal-new-event" />

        <label>Zrealizowane (domyślnie: #98ff9d)</label>
        <input type="color" id="cal-done" />

        <label>W realizacji (domyślnie: #95ceff)</label>
        <input type="color" id="cal-in-progress" />

        <label>Anulowane (domyślnie: #e4e4e4)</label>
        <input type="color" id="cal-canceled" />

        <label>Zaległe (domyślnie: #ff8f8e)</label>
        <input type="color" id="cal-overdue" />

        <hr />

        <h2>Kolory – Zamówienia</h2>

        <label>Nowe zamówienie (domyślnie: #ffe29a)</label>
        <input type="color" id="ord-new" />

        <label>Zrealizowane (domyślnie: #98ff9d)</label>
        <input type="color" id="ord-done" />

        <label>W realizacji (domyślnie: #95ceff)</label>
        <input type="color" id="ord-in-progress" />

        <label>Anulowane (domyślnie: #ff8f8e)</label>
        <input type="color" id="ord-canceled" />

        <br /><br />

        <button id="save-theme">Zapisz</button>
      </section>
    </main>

    <button id="toggle-btn" onclick="toggleDashboardNavbar()">
      <i class="bi bi-chevron-double-right"></i>
    </button>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="script.js"></script>
    <script>
      ///// LOGOWANIE - AUTH - SECURITY

      $("#user-avatar").on("click", function () {
        window.location.href = "logowanie/index.html";
      });

      const userStatus = document.getElementById("user-status");

      async function checkAuth() {
        const res = await fetch("logowanie/api/auth.php");

        if (res.status === 401) {
          userStatus.innerText = "Zaloguj";
        } else if (res.status === 403) {
          userStatus.innerText = "Zablokowany";
        } else {
          userStatus.innerText = "Zalogowany";
        }
      }

      init();

      async function init() {
        const res = await fetch("logowanie/api/auth.php", {
          credentials: "include",
        });

        //alert(res.status);

        if (res.status === 401) {
          window.location.href = "logowanie/index.html";
          return;
        }

        if (res.status === 403) {
          alert("Konto nieaktywne");
          return;
        }

        loadData();
      }

      function loadData() {
        document
          .getElementById("save-theme")
          .addEventListener("click", saveColorsToFile);

        loadColorsFromFile();
      }

      async function saveColorsToFile() {
        const saveData = {
          calNew: document.getElementById("cal-new-event").value,
          calDone: document.getElementById("cal-done").value,
          calInProgress: document.getElementById("cal-in-progress").value,
          calCanceled: document.getElementById("cal-canceled").value,
          calOverdue: document.getElementById("cal-overdue").value,

          ordNew: document.getElementById("ord-new").value,
          ordDone: document.getElementById("ord-done").value,
          ordInProgress: document.getElementById("ord-in-progress").value,
          ordCanceled: document.getElementById("ord-canceled").value,
        };

        fetch("/NowySystemZamowien/api/filesystem.php", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            action: "save",
            filename: "colors.json",
            content: JSON.stringify(saveData),
          }),
        })
          .then((res) => res.json())
          .then((data) => {
            //console.log("Zapisano: ", saveData);
            if (data.success == true) alert("Zapisano");
            else alert("Błąd zapisu");
          });
      }

      async function loadColorsFromFile() {
        const defaultColorsData = {
          calNew: "#ffe29a",
          calDone: "#98ff9d",
          calInProgress: "#95ceff",
          calCanceled: "#e4e4e4",
          calOverdue: "#ff8f8e",

          ordNew: "#ffe29a",
          ordDone: "#98ff9d",
          ordInProgress: "#95ceff",
          ordCanceled: "#ff8f8e",
        };

        fetch("/NowySystemZamowien/api/filesystem.php", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            action: "load",
            filename: "colors.json",
            content: JSON.stringify(defaultColorsData),
          }),
        })
          .then((res) => res.json())
          .then((data) => {
            const parsed = JSON.parse(data.content);

            document.getElementById("cal-new-event").value = parsed.calNew;
            document.getElementById("cal-done").value = parsed.calDone;
            document.getElementById("cal-in-progress").value =
              parsed.calInProgress;
            document.getElementById("cal-canceled").value = parsed.calCanceled;
            document.getElementById("cal-overdue").value = parsed.calOverdue;

            document.getElementById("ord-new").value = parsed.ordNew;
            document.getElementById("ord-done").value = parsed.ordDone;
            document.getElementById("ord-in-progress").value =
              parsed.ordInProgress;
            document.getElementById("ord-canceled").value = parsed.ordCanceled;
          });
      }
    </script>
  </body>
</html>
