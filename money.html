<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ICONS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="style.css" />
    <!-- RUBIK FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <aside id="dashboard-navbar">
      <h1>
        <a href="index.html" id="home-link">
          <i class="bi bi-house-fill"></i> Dashboard</a
        >
      </h1>
      <hr class="separator" />
      <a class="dashboard-link" href="zamowienia/index.html"
        ><i class="bi bi-clipboard2-fill"></i> Zamówienia</a
      >
      <a class="dashboard-link" href="kalendarz/index.html"
        ><i class="bi bi-calendar-event-fill"></i> Kalendarz</a
      >
      <a class="dashboard-link" href="klienci/index.html"
        ><i class="bi bi-file-person-fill"></i> Klienci</a
      >
      <a class="dashboard-link" href="typy_tagi/index.html"
        ><i class="bi bi-info-circle-fill"></i> Typy zamówień | Tagi</a
      >
      <a class="dashboard-link" href="teksty/index.html"
        ><i class="bi bi-chat-left-quote-fill"></i> Teksty</a
      >
      <a class="dashboard-link" href="galeria/index.html"
        ><i class="bi bi-image-fill"></i> Galeria</a
      >
      <i
        class="bi bi-chevron-double-left"
        id="dashboard-toggle-visibility"
        onclick="toggleDashboardNavbar()"
      ></i>
      <hr class="separator" />
    </aside>

    <main>
      <header id="index-header">
        <h1>Zarobki</h1>
      </header>
      <div class="card">
        <h2>📊 Raport zarobków</h2>

        <table>
          <thead>
            <tr>
              <th>Miesiąc</th>
              <th>Zarobek</th>
              <th>Ilość zamówień</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>

        <div class="total">
          <span>Suma</span>
          <span id="total"></span>
        </div>
      </div>
      <div class="card">
        <h2>🏆 Najlepsi klienci</h2>

        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Klient</th>
              <th>Zamówienia</th>
              <th>Status</th>
            </tr>
          </thead>

          <tbody id="clientsBody"></tbody>
        </table>
      </div>
    </main>

    <button id="toggle-btn" onclick="toggleDashboardNavbar()">
      <i class="bi bi-chevron-double-right"></i>
    </button>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="script.js"></script>
    <script>
      ///// LOGOWANIE - AUTH - SECURITY

      $("#user-avatar").on("click", function () {
        window.location.href = "logowanie/index.html";
      });

      const userStatus = document.getElementById("user-status");

      async function checkAuth() {
        const res = await fetch("logowanie/api/auth.php");

        if (res.status === 401) {
          userStatus.innerText = "Zaloguj";
        } else if (res.status === 403) {
          userStatus.innerText = "Zablokowany";
        } else {
          userStatus.innerText = "Zalogowany";
        }
      }

      init();

      async function init() {
        const res = await fetch("logowanie/api/auth.php", {
          credentials: "include",
        });

        //alert(res.status);

        if (res.status === 401) {
          window.location.href = "logowanie/index.html";
          return;
        }

        if (res.status === 403) {
          alert("Konto nieaktywne");
          return;
        }

        loadData();
      }

      function loadData() {
        fetch("api/get_money.php")
          .then((res) => res.json())
          .then((data) => {
            //console.log({ data });
            data.sort((a, b) => {
              const [ma, ya] = a.miesiac.split("-");
              const [mb, yb] = b.miesiac.split("-");
              return yb + mb - (ya + ma);
            });

            const tbody = document.getElementById("tableBody");
            let sum = 0;

            data.forEach((item) => {
              const value = parseFloat(item.zarobek);
              const count = parseInt(item.ilosc);
              sum += value;

              const row = document.createElement("tr");

              row.innerHTML = `
                <td>${item.miesiac}</td>
                <td class="${value === 0 ? "zero" : "good"}">
                  ${value.toLocaleString("pl-PL", { style: "currency", currency: "PLN" })}
                </td>
                <td>
                  ${count}
                </td>
              `;

              tbody.appendChild(row);
            });

            document.getElementById("total").innerText = sum.toLocaleString(
              "pl-PL",
              { style: "currency", currency: "PLN" },
            );
          });

        fetch("api/get_best_clients.php")
          .then((res) => res.json())
          .then((data) => {
            //console.log(data);
            const tbody = document.getElementById("clientsBody");

            data.forEach((item, index) => {
              const orders = parseInt(item.ilosc_zamowien);

              let status = "";
              if (orders >= 10) status = "🔥 VIP";
              else if (orders >= 5) status = "⭐ aktywny";
              else status = "🙂 standard";

              const row = document.createElement("tr");

              row.innerHTML = `
                <td>${index + 1}</td>
                <td>${item.imie} ${item.nazwisko}</td>
                <td>${orders}</td>
                <td>${status}</td>
              `;

              tbody.appendChild(row);
            });
          });
      }
    </script>
  </body>
</html>
