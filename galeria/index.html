    <main>
      <header>
        <h1 id="page-name">Galeria</h1>
        <nav class="subnav">
          <div id="status">...</div>
        </nav>
      </header>
      <hr class="horizontal-separator" />
      <section id="main-section">
        <form id="uploadForm" enctype="multipart/form-data">
          <input type="file" id="fileInput" name="file" />
          <input
            type="text"
            id="opisInput"
            placeholder="Opis pliku"
            name="opis"
          />

        </form>
        <div id="search-by-name">
          <input type="text" id="search-name-input" placeholder="Szukaj..." />
          <button id="reset-name-filter">Resetuj filtr</button>
        </div>
        <div id="photos"></div>
      </section>
    </main>

    <!--<footer>
      <button id="debugBtn">Pokaż strukturę tabeli</button>
      <pre id="debugOutput"></pre>
    </footer>-->

    <!-- wyskakujące okienko -->
    <div class="overlay hidden" id="new-order-overlay">
      <div class="modal">
        <div class="container"></div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../script.js"></script>
    <script>
      // === LOGOWANIE ===

      init();

      async function init() {
        const res = await fetch("../logowanie/api/auth.php", {
          credentials: "include",
        });

        if (res.status === 401 || res.status === 403) {
          alert("Brak dostępu. Należy się zalogować");
          return;
        }

        loadData();
      }

      // =====

      function loadData() {
        const form = document.getElementById("uploadForm");
        //console.log("JS działa");
        //console.log(document.getElementById("uploadForm"));
        const fileInput = document.getElementById("fileInput");
        const opisInput = document.getElementById("opisInput");
        const status = document.getElementById("status");

        form.addEventListener("submit", async (e) => {
          e.preventDefault();

          //console.log("Form submitted");

          const file = fileInput.files[0];
          const opis = opisInput.value;

          if (!file) {
            status.innerText = "Wybierz plik";
            return;
          }

          // walidacja
          const allowedTypes = ["image/png", "image/jpeg", "application/pdf"];
          if (!allowedTypes.includes(file.type)) {
            status.innerText = "Zły typ pliku";
            return;
          }

          if (file.size > 5 * 1024 * 1024) {
            status.innerText = "Plik za duży";
            return;
          }

          const formData = new FormData();
          formData.append("file", file);
          formData.append("opis", opis);

          try {
            const res = await fetch("api/upload.php", {
              method: "POST",
              body: formData,
            });

            if (!res.ok) {
              status.innerText = "Błąd HTTP: " + res.status;
              return;
            }

            const text = await res.text();
            //console.log("Odpowiedź:", text);
            if (text === "ok") loadFiles();

            status.innerText = text;
          } catch (err) {
            console.error("Fetch error:", err);
            status.innerText = "Błąd połączenia";
          }
        });

        ///// ładowanie zdjęć

        async function loadFiles(nameFilter = "") {
          let url = "api/files.php";

          if (nameFilter && nameFilter.trim() !== "") {
            url += "?filter=" + encodeURIComponent(nameFilter.trim());
          }

          const res = await fetch(url);
          const files = await res.json();

          const photosContainer = document.querySelector("#photos");
          photosContainer.innerHTML = "";

          files.forEach((f) => {
            const div = document.createElement("div");

            const link = document.createElement("a");
            link.href = "uploads/" + f.sciezka;
            link.target = "_blank";
            link.innerText = f.nazwa_pliku;

            const opis = document.createElement("p");
            opis.innerText = f.opis || "Brak opisu";

            const data = document.createElement("small");
            data.innerText = f.data_dodania;

            div.appendChild(link);
            div.appendChild(opis);
            div.appendChild(data);

            if (f.sciezka.match(/\.(jpg|jpeg|png)$/i)) {
              const imgLink = document.createElement("a");
              imgLink.href = "uploads/" + f.sciezka;
              imgLink.target = "_blank";

              const img = document.createElement("img");
              img.src = "uploads/" + f.sciezka;

              imgLink.appendChild(img);
              div.appendChild(imgLink);
            }

            const deleteBtn = document.createElement("button");
            deleteBtn.innerText = "Usuń";

            deleteBtn.addEventListener("click", async () => {
              if (!confirm("Na pewno usunąć?")) return;

              const res = await fetch("api/delete.php", {
                method: "POST",
                headers: {
                  "Content-Type": "application/x-www-form-urlencoded",
                },
                body: "id=" + encodeURIComponent(f.id),
              });

              const text = await res.text();

              if (text === "ok") {
                loadFiles();
              } else {
                alert("Błąd: " + text);
              }
            });

            div.appendChild(deleteBtn);

            photosContainer.appendChild(div);
          });
        }

        loadFiles();

        ///// table debug in footer
        /*document
        .getElementById("debugBtn")
        .addEventListener("click", async () => {
          try {
            const res = await fetch("api/debug_table.php");

            if (!res.ok) {
              throw new Error("HTTP " + res.status);
            }

            const text = await res.text();

            console.log(text);
            document.getElementById("debugOutput").innerText = text;
          } catch (err) {
            console.error(err);
          }
        });*/

        ///// szukanie zdjęcia
        const nameInput = document.querySelector("#search-name-input");
        nameInput.addEventListener("input", () => {
          const searchNameValue = nameInput.value.trim();

          if (searchNameValue === "") {
            status.innerText = "Musisz coś wpisać w polu wyszukiwania";
            return;
          }

          loadFiles(searchNameValue);
        });

        document
          .querySelector("#reset-name-filter")
          .addEventListener("click", () => {
            loadFiles();
          });
      }
    </script>
